services:
  - type: web
    name: mini-crm-backend
    runtime: node
    plan: free
    buildCommand: npm run install-server
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: JWT_SECRET
        generateValue: true
    envVarGroups:
      - name: DATABASE
        envVars:
          - key: DATABASE_URL
            fromDatabase:
              name: mini-crm-db
              property: connectionString

  - type: postgres
    name: mini-crm-db
    ipAllowList: []
    plan: free